name: Generate Game of Life

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deterministic Execution Check
        id: check
        run: |
          # Create a deterministic binary decision based on the current date
          DATE=$(date +%Y-%m-%d)
          HASH=$(echo -n $DATE | md5sum | cut -c1)
          
          # 50% chance: if hex character is 0-7, run. Otherwise, skip.
          if [[ "$HASH" =~ [0-7] ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Deterministic check failed for $DATE, skipping generation."
          fi

      - name: Setup Python
        if: steps.check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Generate SVG
        if: steps.check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: python generate.py

      - name: Generate GitHub Stats
        if: steps.check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: python stats.py

      - name: Commit and Push
        if: steps.check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dark.svg light.svg README.md
          git commit -m "Update Game of Life simulation and GitHub Stats" || echo "No changes to commit"
          git push
